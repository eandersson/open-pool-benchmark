{
  "_comment": "Bench-tuned ckpool config for open-pool-benchmark (BTCSOLO mode). The orchestrator fills the placeholders (RPC_HOST RPC_PORT RPC_USER RPC_PASS ADDRESS TAG DIFFICULTY MIN_DIFFICULTY) per run. Vardiff is on (mindiff below startdiff gives it room) so the pool retargets difficulty during a run -- the realistic production mode, and what lets the work audit also exercise the re-send-after-vardiff path. JSON has no comments, so this _comment key carries the docs; ckpool ignores keys it doesn't know.",
  "btcd": [
    {
      "url": "${RPC_HOST}:${RPC_PORT}",
      "auth": "${RPC_USER}",
      "pass": "${RPC_PASS}",
      "notify": true
    }
  ],
  "btcaddress": "${ADDRESS}",
  "btcsig": "${TAG}",
  "blockpoll": 100,
  "update_interval": 30,
  "serverurl": ["0.0.0.0:3333"],
  "mindiff": ${MIN_DIFFICULTY},
  "startdiff": ${DIFFICULTY},
  "maxdiff": ${DIFFICULTY},
  "zmqblock": "tcp://${RPC_HOST}:28332",
  "logdir": "/ckpool/logs"
}
