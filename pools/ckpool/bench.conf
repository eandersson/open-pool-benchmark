{
  "_comment": "Bench-tuned ckpool config for open-pool-benchmark (BTCSOLO mode). The orchestrator fills the placeholders (RPC_HOST RPC_PORT RPC_USER RPC_PASS ADDRESS TAG DIFFICULTY) per run. mindiff=startdiff=maxdiff pins difficulty (no vardiff) so every share runs the full validation path then is rejected above target. JSON has no comments, so this _comment key carries the docs; ckpool ignores keys it doesn't know.",
  "btcd": [
    {
      "url": "${RPC_HOST}:${RPC_PORT}",
      "auth": "${RPC_USER}",
      "pass": "${RPC_PASS}",
      "notify": true
    }
  ],
  "btcaddress": "${ADDRESS}",
  "btcsig": "${TAG}",
  "blockpoll": 100,
  "update_interval": 30,
  "serverurl": ["0.0.0.0:3333"],
  "mindiff": ${DIFFICULTY},
  "startdiff": ${DIFFICULTY},
  "maxdiff": ${DIFFICULTY},
  "zmqblock": "tcp://${RPC_HOST}:28332",
  "logdir": "/ckpool/logs"
}
