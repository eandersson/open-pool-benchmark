[backend]
host = '${RPC_HOST}:${RPC_PORT}'
rpcauth = '${RPC_USER}:${RPC_PASS}'
poll_interval = 500

[pogolo]
host = '0.0.0.0'
port = 5661
http_port = 5662
tag = '${TAG}'
pool_address = '${ADDRESS}'
default_difficulty = ${DIFFICULTY}
disable_vardiff = true
ignore_suggested_difficulty = true
job_interval = 3600
